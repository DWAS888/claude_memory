<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 记忆库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 1.25rem; margin-bottom: 1rem; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  input, textarea { width: 100%; font-size: 15px; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-family: inherit; outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus { border-color: #999; background: #fff; }
  textarea { resize: vertical; line-height: 1.6; min-height: 320px; font-size: 14px; font-family: "SF Mono", "Consolas", monospace; }
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  button { height: 42px; padding: 0 18px; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; border: 1px solid #e0e0e0; background: #fff; color: #1a1a1a; font-family: inherit; transition: background 0.15s, opacity 0.15s; white-space: nowrap; }
  button:hover { background: #f5f5f5; }
  button:active { opacity: 0.7; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .status { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .ok { color: #2d7a3a; }
  .err { color: #c0392b; }
  .section-label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 12px; }
  .tip { font-size: 12px; color: #aaa; margin-top: 8px; line-height: 1.5; }
  .divider { height: 1px; background: #f0f0f0; margin: 1rem 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .card { background: #1c1c1e; border-color: #2c2c2e; }
    input, textarea { background: #2c2c2e; border-color: #3a3a3c; color: #eee; }
    input:focus, textarea:focus { border-color: #666; background: #333; }
    button { background: #2c2c2e; border-color: #3a3a3c; color: #eee; }
    button:hover { background: #3a3a3c; }
    .btn-primary { background: #eee; color: #111; border-color: #eee; }
    .btn-primary:hover { background: #ccc; }
    .divider { background: #2c2c2e; }
    .ok { color: #5cba6a; }
    .err { color: #e06c6c; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📓 Claude 记忆库</h1>
  <p class="subtitle">读取、编辑、保存你的记忆文件，或复制给 Claude</p>

  <div class="card">
    <div class="section-label">GitHub 配置</div>
    <div class="field">
      <label>用户名</label>
      <input id="user" type="text" placeholder="DWAS888" autocomplete="off" autocapitalize="off">
    </div>
    <div class="field">
      <label>仓库名</label>
      <input id="repo" type="text" placeholder="claude_memory" autocomplete="off" autocapitalize="off">
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input id="token" type="password" placeholder="ghp_..." autocomplete="off">
    </div>
    <p class="tip">Token 仅在本地使用，不经过任何服务器。建议生成一个只有 repo 权限的专用 token。</p>
  </div>

  <div class="card">
    <div class="row" style="margin-bottom: 12px;">
      <button class="btn-primary" onclick="loadMemory()">读取记忆库</button>
      <button onclick="saveMemory()">保存到 GitHub ↑</button>
      <button onclick="copyPrompt()">复制给 Claude ↗</button>
    </div>
    <div class="status" id="status"></div>
    <div class="divider"></div>
    <textarea id="content" placeholder="点击「读取记忆库」加载内容，也可以直接在这里编辑后保存..."></textarea>
  </div>

  <p class="tip" style="text-align:center;">新对话开始时点「复制给 Claude」，粘贴到对话开头即可</p>
</div>

<script>
const STORAGE_KEY = 'claude_memory_config';

window.onload = () => {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.user) document.getElementById('user').value = saved.user;
    if (saved.repo) document.getElementById('repo').value = saved.repo;
    if (saved.token) document.getElementById('token').value = saved.token;
  } catch(e) {}
};

function saveConfig() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      user: document.getElementById('user').value.trim(),
      repo: document.getElementById('repo').value.trim(),
      token: document.getElementById('token').value.trim(),
    }));
  } catch(e) {}
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

function getInfo() {
  const user = document.getElementById('user').value.trim();
  const repo = document.getElementById('repo').value.trim();
  const token = document.getElementById('token').value.trim();
  if (!user || !repo || !token) { setStatus('请填写用户名、仓库名和 Token', 'err'); return null; }
  saveConfig();
  return { user, repo, token };
}

async function loadMemory() {
  const info = getInfo();
  if (!info) return;
  setStatus('读取中...');
  try {
    const res = await fetch(`https://api.github.com/repos/${info.user}/${info.repo}/contents/memories.md`, {
      headers: { Authorization: `token ${info.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`读取失败（${res.status}），检查 token 和仓库名`);
    const data = await res.json();
    document.getElementById('content').value = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    window._sha = data.sha;
    setStatus('读取成功！', 'ok');
  } catch(e) {
    setStatus(e.message, 'err');
  }
}

async function saveMemory() {
  const info = getInfo();
  if (!info) return;
  const content = document.getElementById('content').value;
  if (!content.trim()) { setStatus('内容为空', 'err'); return; }
  if (!window._sha) { setStatus('请先点「读取记忆库」', 'err'); return; }
  setStatus('保存中...');
  try {
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const res = await fetch(`https://api.github.com/repos/${info.user}/${info.repo}/contents/memories.md`, {
      method: 'PUT',
      headers: { Authorization: `token ${info.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '更新记忆库', content: encoded, sha: window._sha })
    });
    if (!res.ok) throw new Error('保存失败，请重试');
    const data = await res.json();
    window._sha = data.content.sha;
    setStatus('保存成功！', 'ok');
  } catch(e) {
    setStatus(e.message, 'err');
  }
}

function copyPrompt() {
  const content = document.getElementById('content').value;
  if (!content.trim()) { setStatus('请先读取记忆库', 'err'); return; }
  const text = `请读取我的记忆库，在本次对话中记住以下信息：\n\n${content}`;
  navigator.clipboard.writeText(text).then(() => setStatus('已复制！粘贴到新对话开头即可', 'ok')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    setStatus('已复制！', 'ok');
  });
}
</script>
</body>
</html>
